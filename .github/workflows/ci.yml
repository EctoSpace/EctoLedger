# CI — Ecto Ledger v0.6.2
#
# Trigger: push to main, pull requests, and manual dispatch.
#
# Jobs:
#   fmt             – Rustfmt (ubuntu, seconds)
#   lint            – Clippy (ubuntu)
#   security-audit  – cargo-audit for known CVEs (ubuntu)
#   test            – cargo test on all 3 OS
#   enclave-unit    – IPC + remote-attestation unit tests (ubuntu-only)
#   enclave-apple-hv – Apple Hypervisor boot (macOS, continue-on-error)
#   gui             – Svelte type-check + Vite build (ubuntu-only)
#   sdk-python      – Python SDK pytest (ubuntu-only)
#   sdk-typescript  – TypeScript SDK vitest (ubuntu-only)
#   integration-test – scripts/test-integration.sh (ubuntu)
#   tauri-bundle    – Full Tauri desktop bundle (all 3 OS, uploads artifacts)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "1"
  RUSTFLAGS: -D warnings

jobs:
  # ── Format check (zero compilation, fast) ──────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy lint (single platform) ──────────────────────────────────────────
  lint:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: "ci-ubuntu"

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev

      # Single Clippy pass with superset of features — compiles once
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --features enclave,enclave-remote,sandbox,evm -- -D warnings

  # ── Security audit against RustSec advisory database ──────────────────────
  security-audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: "ci-ubuntu"
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        # Ignore medium-severity advisories with no available fix:
        #   RUSTSEC-2023-0071: rsa Marvin Attack – no fixed version of rsa 0.9.x available
        #   RUSTSEC-2020-0071: time 0.1 segfault – pulled in transitively via pg-embed/archiver-rs/zip 0.5
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2020-0071

  # ── Build & test on all platforms ──────────────────────────────────────────
  test:
    name: Test — ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: "sandbox,evm"
            shared-key: "ci-ubuntu"
          - os: macos-latest
            features: "evm"
            shared-key: "ci-macos"
          - os: windows-latest
            features: "evm"
            shared-key: "ci-windows"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: ${{ matrix.shared-key }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev

      # cargo test compiles implicitly — no separate build step needed
      - name: Run workspace tests
        run: cargo test --workspace --features ${{ matrix.features }}

  # ── Enclave crypto tests (ubuntu-only — platform-independent logic) ────────
  enclave-unit:
    name: Enclave crypto
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: "ci-ubuntu"

      - name: Enclave tests (IPC + remote attestation)
        run: |
          cargo test --features enclave -p ectoledger --lib -- enclave::ipc::tests
          cargo test --features enclave -p ectoledger --test enclave_ipc
          cargo test --features enclave-remote -p ectoledger --lib -- enclave::remote::tests

  # ── macOS Apple HV boot (requires bare-metal Apple Silicon) ────────────────
  # GitHub-hosted runners are VMs, so Hypervisor.framework is unavailable.
  # The test binary gracefully skips when HV is not present.
  # This job will pass automatically if GitHub ever enables nested virtualisation
  # or when run on a self-hosted bare-metal Apple Silicon runner.
  enclave-apple-hv:
    name: Apple Hypervisor boot
    runs-on: macos-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,aarch64-unknown-none
          components: llvm-tools
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: "ci-macos-enclave"

      - name: Build enclave test binaries
        run: cargo test --features sandbox-apple-enclave --no-run 2>&1

      - name: Codesign test binary
        run: |
          BIN=$(ls -t target/debug/deps/enclave_apple_boot-* | grep -v '\.' | head -1)
          echo "Signing: $BIN"
          codesign -s - --entitlements entitlements.xml --force "$BIN"

      - name: Run Apple HV tests (codesigned)
        run: |
          BIN=$(ls -t target/debug/deps/enclave_apple_boot-* | grep -v '\.' | head -1)
          "$BIN" --nocapture

  # ── Tauri GUI type-check + Vite build (ubuntu-only) ────────────────────────
  gui:
    name: GUI build & check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Svelte check + Vite build
        run: |
          npx svelte-check --tsconfig ./tsconfig.json --fail-on-warnings
          npx vite build

  # ── Python SDK tests (ubuntu-only) ────────────────────────────────────────
  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: "ci-ubuntu"

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev
        working-directory: ${{ github.workspace }}

      - name: Build EctoLedger binary
        run: cargo build -p ectoledger --features sandbox,evm
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install SDK with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
        env:
          ECTOLEDGER_BINARY: ${{ github.workspace }}/target/debug/ectoledger

  # ── TypeScript SDK tests (ubuntu-only) ────────────────────────────────────
  sdk-typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck + test
        run: |
          npx tsc --noEmit
          npx vitest run

  # ── Integration test suite ────────────────────────────────────────────────
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: "ci-ubuntu"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev

      - name: Build host binary
        run: cargo build -p ectoledger --features sandbox,evm

      - name: Run integration test script
        run: bash scripts/test-integration.sh
        timeout-minutes: 10

  # ── Full Tauri desktop bundle (all platforms, upload artifacts) ────────────
  tauri-bundle:
    name: Tauri bundle — ${{ matrix.os }}
    timeout-minutes: 40
    needs: [lint, test, gui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            shared-key: "ci-ubuntu"
            artifact-glob: |
              gui/src-tauri/target/release/bundle/**/*.AppImage
              gui/src-tauri/target/release/bundle/**/*.deb
          - os: macos-latest
            platform: macos
            shared-key: "ci-macos"
            artifact-glob: |
              gui/src-tauri/target/release/bundle/**/*.dmg
              gui/src-tauri/target/release/bundle/**/*.app
          - os: windows-latest
            platform: windows
            shared-key: "ci-windows"
            artifact-glob: |
              gui/src-tauri/target/release/bundle/**/*.msi
              gui/src-tauri/target/release/bundle/**/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          shared-key: ${{ matrix.shared-key }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install npm dependencies
        working-directory: gui
        run: npm ci --no-audit --no-fund

      - name: Build Tauri desktop bundle
        working-directory: gui
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ectoledger-${{ matrix.platform }}-${{ github.sha }}
          path: |
            ${{ matrix.artifact-glob }}
          if-no-files-found: warn
          retention-days: 14

